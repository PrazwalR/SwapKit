name: Publish Rust crates

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish swap-kit-types
        working-directory: swap-kit
        run: cargo publish -p swap-kit-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish swap-kit-engine
        working-directory: swap-kit
        run: cargo publish -p swap-kit-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
