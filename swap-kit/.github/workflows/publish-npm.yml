name: Publish npm packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: swap-kit/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: swap-kit
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: swap-kit
        run: pnpm build

      - name: Publish @swap-kit/core
        working-directory: swap-kit/packages/core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @swap-kit/react
        working-directory: swap-kit/packages/react
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
